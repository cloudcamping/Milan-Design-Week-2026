<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a1a">
<title>Milan Design Week 2026</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "Segoe UI", sans-serif; background: #1a1a1a; color: #fff; overscroll-behavior: none; }
body { display: flex; flex-direction: column; overflow: hidden; }

header {
  background: #0f0f0f; padding: env(safe-area-inset-top) 12px 0;
  border-bottom: 1px solid #2a2a2a; flex-shrink: 0;
}
.title-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 8px; }
.title-bar h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
.title-bar .counts { font-size: 11px; color: #888; }

.tabs { display: flex; gap: 4px; padding-bottom: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 6px 12px; border-radius: 14px; background: #2a2a2a; color: #ccc;
  font-size: 12px; font-weight: 500; white-space: nowrap; cursor: pointer; border: none;
  transition: background .15s;
}
.tab.active { background: #fff; color: #000; }

.filters { display: flex; gap: 4px; padding-bottom: 8px; overflow-x: auto; }
.filters::-webkit-scrollbar { display: none; }
.chip {
  padding: 5px 10px; border-radius: 12px; background: transparent; border: 1px solid #3a3a3a;
  color: #aaa; font-size: 11px; white-space: nowrap; cursor: pointer;
}
.chip.active { background: #3a3a3a; color: #fff; border-color: #555; }

main { flex: 1; position: relative; overflow: hidden; }
#map { width: 100%; height: 100%; background: #1a1a1a; }

.leaflet-container { background: #2a2a2a !important; }
.leaflet-popup-content-wrapper { background: #1a1a1a; color: #fff; border-radius: 10px; }
.leaflet-popup-tip { background: #1a1a1a; }
.leaflet-popup-close-button { color: #888 !important; font-size: 20px !important; padding: 6px !important; }
.leaflet-control-attribution { background: rgba(0,0,0,.6) !important; color: #888 !important; font-size: 9px !important; }
.leaflet-control-attribution a { color: #aaa !important; }
.leaflet-control-zoom a { background: #1a1a1a !important; color: #fff !important; border-color: #333 !important; }

.pin {
  width: 28px; height: 28px; border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg); border: 2px solid #fff; display: flex;
  align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,.5);
}
.pin span { transform: rotate(45deg); font-size: 13px; font-weight: 700; color: #fff; }
.pin.highdemand::after {
  content: ""; position: absolute; top: -4px; right: -4px; width: 10px; height: 10px;
  background: #ff4444; border-radius: 50%; border: 2px solid #fff; transform: rotate(45deg);
}

.popup-card { min-width: 240px; max-width: 280px; font-size: 13px; }
.popup-card .district { display: inline-block; padding: 2px 7px; border-radius: 6px; font-size: 10px; font-weight: 600; margin-bottom: 6px; }
.popup-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 2px; line-height: 1.2; }
.popup-card .exhibition { font-size: 12px; color: #ccc; font-style: italic; margin-bottom: 6px; }
.popup-card .desc { font-size: 12px; line-height: 1.4; color: #ddd; margin-bottom: 8px; }
.popup-card .venue { font-size: 11px; color: #888; margin-bottom: 8px; }
.popup-card .reservation { font-size: 11px; padding: 6px 8px; border-radius: 6px; margin-bottom: 6px; }
.popup-card .reservation.required { background: rgba(255,80,80,.15); color: #ff8080; border: 1px solid rgba(255,80,80,.3); }
.popup-card .reservation.walkin { background: rgba(80,200,80,.12); color: #80c880; border: 1px solid rgba(80,200,80,.25); }
.popup-card .reservation.demand { background: rgba(255,180,80,.12); color: #ffb060; border: 1px solid rgba(255,180,80,.25); }
.popup-card .actions { display: flex; gap: 6px; flex-wrap: wrap; }
.popup-card .actions a {
  flex: 1; text-align: center; padding: 7px; border-radius: 6px; font-size: 11px;
  font-weight: 600; text-decoration: none; min-width: 80px;
}
.popup-card .actions .maps { background: #4285f4; color: #fff; }
.popup-card .actions .book { background: #fff; color: #000; }
.popup-card .actions .info { background: #3a3a3a; color: #fff; }
.popup-card .days { display: flex; gap: 3px; margin-bottom: 6px; }
.popup-card .day { font-size: 10px; padding: 2px 6px; border-radius: 8px; background: #2a2a2a; color: #888; }
.popup-card .day.open { background: #2a4a2a; color: #80c880; }

.list-toggle {
  position: absolute; right: 12px; bottom: 24px; z-index: 500;
  background: #fff; color: #000; border: none; padding: 10px 14px;
  border-radius: 22px; font-size: 13px; font-weight: 600;
  box-shadow: 0 4px 12px rgba(0,0,0,.4); cursor: pointer;
  display: flex; align-items: center; gap: 6px;
}
.list-toggle svg { width: 14px; height: 14px; }

.locate-btn {
  position: absolute; right: 12px; bottom: 76px; z-index: 500;
  background: #1a1a1a; color: #fff; border: 1px solid #3a3a3a;
  width: 44px; height: 44px; border-radius: 22px;
  box-shadow: 0 4px 12px rgba(0,0,0,.4); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.locate-btn:active { background: #2a2a2a; }
.locate-btn.active { background: #1e88e5; border-color: #1e88e5; }
.locate-btn.loading svg { animation: spin 1s linear infinite; }
.locate-btn svg { width: 20px; height: 20px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Blue dot for user position (Google Maps style) */
.user-dot {
  width: 18px; height: 18px; border-radius: 50%;
  background: #1e88e5; border: 3px solid #fff;
  box-shadow: 0 0 0 2px rgba(30,136,229,.3), 0 2px 6px rgba(0,0,0,.4);
}
.user-dot.pulse::before {
  content: ""; position: absolute; top: -3px; left: -3px;
  width: 18px; height: 18px; border-radius: 50%;
  background: rgba(30,136,229,.4);
  animation: pulse 2s ease-out infinite;
}
@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(3); opacity: 0; }
}

.sheet {
  position: absolute; bottom: 0; left: 0; right: 0; background: #1a1a1a;
  border-top-left-radius: 16px; border-top-right-radius: 16px;
  max-height: 70vh; transform: translateY(100%); transition: transform .25s;
  z-index: 600; display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 -4px 16px rgba(0,0,0,.5);
}
.sheet.open { transform: translateY(0); }
.sheet-handle {
  width: 36px; height: 4px; background: #555; border-radius: 2px;
  margin: 8px auto 4px; flex-shrink: 0;
}
.sheet-header { display: flex; justify-content: space-between; padding: 4px 14px 8px; align-items: center; flex-shrink: 0; }
.sheet-header h2 { font-size: 14px; font-weight: 600; }
.sheet-header button { background: none; border: none; color: #888; font-size: 18px; cursor: pointer; padding: 4px; }
.sheet-list { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 8px 40px; }
.list-item {
  padding: 10px 10px; border-radius: 8px; margin-bottom: 4px; cursor: pointer;
  display: flex; align-items: flex-start; gap: 10px;
}
.list-item:hover { background: #252525; }
.list-item .dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.list-item .body { flex: 1; min-width: 0; }
.list-item .name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.list-item .sub { font-size: 11px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.list-item .meta { font-size: 10px; color: #666; margin-top: 2px; }
.list-item .badge { font-size: 9px; padding: 1px 5px; border-radius: 4px; margin-left: 4px; }
.list-item .badge.req { background: rgba(255,80,80,.2); color: #ff8080; }
.list-item .badge.dem { background: rgba(255,180,80,.2); color: #ffb060; }

.empty { text-align: center; color: #666; padding: 40px 20px; font-size: 13px; }

.leaflet-popup-content { margin: 12px !important; }
</style>
</head>
<body>
<header>
  <div class="title-bar">
    <h1>Milan Design Week 2026</h1>
    <span class="counts" id="counts">–</span>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="filters" id="filters"></div>
</header>
<main>
  <div id="map"></div>
  <button class="locate-btn" id="locateBtn" title="Mein Standort">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v2M12 20v2M2 12h2M20 12h2"/>
    </svg>
  </button>
  <button class="list-toggle" id="listBtn">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
    Liste
  </button>
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 id="sheetTitle">Alle Events</h2>
      <button id="sheetClose">×</button>
    </div>
    <div class="sheet-list" id="sheetList"></div>
  </div>
</main>

<script src="data.js"></script>
<script>
const districtColors = {
  "Brera": "#c2410c",
  "Tortona": "#059669",
  "5VIE": "#7c3aed",
  "Isola": "#db2777",
  "Porta Venezia": "#0284c7",
  "Porta Nuova": "#ca8a04",
  "Centro": "#dc2626",
  "Durini": "#f59e0b",
  "INTERNI Materiae": "#14b8a6",
  "Triennale": "#4338ca",
  "ADI": "#be123c",
  "Alcova": "#0d9488",
  "Navigli": "#65a30d",
  "Featured": "#64748b"
};

const state = {
  day: "all", // "20", "21", "22", "23", "all"
  district: "all",
  reservation: "all" // "required", "walkin", "demand", "all"
};

// ----- Tabs -----
const tabsEl = document.getElementById("tabs");
const tabs = [
  { id: "all", label: "Alle" },
  { id: "20", label: "Mo 20.04" },
  { id: "21", label: "Di 21.04" },
  { id: "22", label: "Mi 22.04" },
  { id: "23", label: "Do 23.04" }
];
tabs.forEach(t => {
  const btn = document.createElement("button");
  btn.className = "tab" + (state.day === t.id ? " active" : "");
  btn.textContent = t.label;
  btn.onclick = () => { state.day = t.id; render(); updateTabs(); };
  btn.dataset.id = t.id;
  tabsEl.appendChild(btn);
});
function updateTabs() {
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.id === state.day));
}

// ----- Filter chips -----
const filtersEl = document.getElementById("filters");
const filters = [
  { key: "reservation", val: "all", label: "Alle" },
  { key: "reservation", val: "required", label: "🔴 Reserv. nötig" },
  { key: "reservation", val: "walkin", label: "🟢 Walk-in" },
  { key: "reservation", val: "demand", label: "⏳ Schlange-Alarm" }
];
filters.forEach(f => {
  const btn = document.createElement("button");
  btn.className = "chip" + (state[f.key] === f.val ? " active" : "");
  btn.textContent = f.label;
  btn.onclick = () => {
    state[f.key] = f.val;
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    btn.classList.add("active");
    render();
  };
  filtersEl.appendChild(btn);
});

// ----- Map -----
const map = L.map("map", {
  center: [45.472, 9.186],
  zoom: 13,
  zoomControl: true
});
// Dark tile layer
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '© OpenStreetMap © CARTO',
  maxZoom: 19
}).addTo(map);

// Hotel marker
const hotelIcon = L.divIcon({
  html: '<div style="background:#fff;color:#000;padding:4px 8px;border-radius:12px;font-size:10px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.5);white-space:nowrap;">🏨 Hotel</div>',
  className: "", iconSize: [0, 0], iconAnchor: [30, 12]
});
L.marker([45.4890, 9.2180], { icon: hotelIcon }).addTo(map)
  .bindPopup('<div class="popup-card"><h3>Unterkunft</h3><div class="venue">Viale Monza 177/3 · Zone Loreto</div></div>');

let markerLayer = L.layerGroup().addTo(map);

function makeMarker(ev) {
  const color = districtColors[ev.district] || "#666";
  const highDemandClass = ev.highDemand ? " highdemand" : "";
  const icon = L.divIcon({
    html: `<div class="pin${highDemandClass}" style="background:${color}"><span>${ev.pin || ""}</span></div>`,
    className: "",
    iconSize: [28, 34],
    iconAnchor: [14, 34],
    popupAnchor: [0, -32]
  });
  const marker = L.marker(ev.coords, { icon });
  marker.bindPopup(popupHtml(ev), { minWidth: 260, maxWidth: 300 });
  marker.on("click", () => {
    document.getElementById("sheet").classList.remove("open");
  });
  return marker;
}

function popupHtml(ev) {
  const color = districtColors[ev.district];
  const mapsLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.venue + ", " + ev.address)}`;
  const resClass = ev.reservation.required ? "required" : (ev.highDemand ? "demand" : "walkin");
  const resText = ev.reservation.required
    ? `🔴 Reservierung nötig: ${ev.reservation.note || ""}`
    : (ev.highDemand ? `⏳ Walk-in, lange Schlangen` : `🟢 Walk-in, frei`);
  const days = ev.days && ev.days.length
    ? `<div class="days">${[20, 21, 22, 23, 24, 25, 26].map(d => `<span class="day${ev.days.includes(d) ? " open" : ""}">${d}</span>`).join("")}</div>`
    : "";
  const buttons = [
    `<a class="maps" href="${mapsLink}" target="_blank">📍 Maps</a>`
  ];
  if (ev.reservation.link) buttons.push(`<a class="book" href="${ev.reservation.link}" target="_blank">🎟 Buchen</a>`);
  if (ev.infoLink && !ev.reservation.link) buttons.push(`<a class="info" href="${ev.infoLink}" target="_blank">ℹ︎ Info</a>`);
  return `
    <div class="popup-card">
      <div class="district" style="background:${color}20;color:${color};">${ev.district}</div>
      <h3>${ev.name}</h3>
      <div class="exhibition">${ev.exhibition || ""}</div>
      <div class="desc">${ev.description || ""}</div>
      ${days}
      <div class="venue">📍 ${ev.venue}, ${ev.address}</div>
      <div class="reservation ${resClass}">${resText}</div>
      <div class="actions">${buttons.join("")}</div>
    </div>`;
}

// ----- Filtering -----
function matches(ev) {
  if (state.day !== "all" && !(ev.days && ev.days.includes(parseInt(state.day)))) return false;
  if (state.reservation === "required" && !ev.reservation.required) return false;
  if (state.reservation === "walkin" && (ev.reservation.required || ev.highDemand)) return false;
  if (state.reservation === "demand" && !ev.highDemand) return false;
  return true;
}

function render() {
  markerLayer.clearLayers();
  const filtered = EVENTS.filter(matches);
  filtered.forEach(ev => markerLayer.addLayer(makeMarker(ev)));
  document.getElementById("counts").textContent = `${filtered.length} Events`;
  renderList(filtered);
}

function renderList(list) {
  const sheetList = document.getElementById("sheetList");
  if (!list.length) {
    sheetList.innerHTML = '<div class="empty">Keine Events passen zum aktuellen Filter.</div>';
    return;
  }
  // group by district
  const byDistrict = {};
  list.forEach(ev => {
    (byDistrict[ev.district] = byDistrict[ev.district] || []).push(ev);
  });
  sheetList.innerHTML = Object.entries(byDistrict).map(([dist, evs]) => {
    const c = districtColors[dist] || "#666";
    return `
      <div style="padding:14px 6px 4px;font-size:11px;color:${c};font-weight:700;letter-spacing:.4px;text-transform:uppercase;">${dist} · ${evs.length}</div>
      ${evs.map(ev => `
        <div class="list-item" data-id="${ev.id}">
          <div class="dot" style="background:${c}"></div>
          <div class="body">
            <div class="name">${ev.name}${ev.reservation.required ? '<span class="badge req">🔒</span>' : ""}${ev.highDemand ? '<span class="badge dem">⏳</span>' : ""}</div>
            <div class="sub">${ev.exhibition || ""}</div>
            <div class="meta">${ev.venue}</div>
          </div>
        </div>`).join("")}
    `;
  }).join("");
  sheetList.querySelectorAll(".list-item").forEach(el => {
    el.onclick = () => {
      const ev = EVENTS.find(x => x.id == el.dataset.id);
      if (!ev) return;
      map.flyTo(ev.coords, 16, { duration: 0.6 });
      document.getElementById("sheet").classList.remove("open");
      setTimeout(() => {
        markerLayer.eachLayer(m => {
          if (m.getLatLng().lat === ev.coords[0] && m.getLatLng().lng === ev.coords[1]) m.openPopup();
        });
      }, 650);
    };
  });
}

// ----- Sheet -----
const sheetEl = document.getElementById("sheet");
document.getElementById("listBtn").onclick = () => sheetEl.classList.toggle("open");
document.getElementById("sheetClose").onclick = () => sheetEl.classList.remove("open");

// swipe down to close sheet
let touchStartY = 0;
sheetEl.addEventListener("touchstart", e => { touchStartY = e.touches[0].clientY; }, { passive: true });
sheetEl.addEventListener("touchend", e => {
  const diff = e.changedTouches[0].clientY - touchStartY;
  if (diff > 60 && sheetEl.scrollTop === 0) sheetEl.classList.remove("open");
}, { passive: true });

// ----- Geolocation (Eigener Standort) -----
const locateBtn = document.getElementById("locateBtn");
let userMarker = null;
let accuracyCircle = null;
let watchId = null;
let followUser = false;

function createUserIcon(withPulse = true) {
  return L.divIcon({
    html: `<div class="user-dot${withPulse ? " pulse" : ""}" style="position:relative"></div>`,
    className: "",
    iconSize: [18, 18],
    iconAnchor: [9, 9]
  });
}

function updateUserPosition(pos) {
  const { latitude, longitude, accuracy } = pos.coords;
  const latlng = [latitude, longitude];

  if (!userMarker) {
    userMarker = L.marker(latlng, { icon: createUserIcon(true), zIndexOffset: 1000 })
      .addTo(map)
      .bindPopup('<div class="popup-card"><h3>Dein Standort</h3><div class="venue">Genauigkeit: ±' + Math.round(accuracy) + ' m</div></div>');
    accuracyCircle = L.circle(latlng, {
      radius: accuracy,
      color: "#1e88e5",
      fillColor: "#1e88e5",
      fillOpacity: 0.1,
      weight: 1
    }).addTo(map);
  } else {
    userMarker.setLatLng(latlng);
    accuracyCircle.setLatLng(latlng).setRadius(accuracy);
  }
  locateBtn.classList.remove("loading");
  locateBtn.classList.add("active");

  if (followUser) {
    map.setView(latlng, Math.max(map.getZoom(), 15), { animate: true });
  }
}

function onLocationError(err) {
  locateBtn.classList.remove("loading", "active");
  let msg = "Standort nicht verfügbar.";
  if (err.code === 1) msg = "Standort-Zugriff verweigert. Bitte in den Browser-Einstellungen erlauben.";
  else if (err.code === 2) msg = "Standort konnte nicht ermittelt werden.";
  else if (err.code === 3) msg = "Standort-Anfrage abgelaufen.";
  alert(msg);
}

locateBtn.addEventListener("click", () => {
  if (!navigator.geolocation) {
    alert("Geolocation wird von diesem Browser nicht unterstützt.");
    return;
  }

  // Toggle: wenn schon aktiv und User-Marker vorhanden → ausschalten
  if (userMarker && locateBtn.classList.contains("active")) {
    if (watchId !== null) navigator.geolocation.clearWatch(watchId);
    watchId = null;
    followUser = false;
    map.removeLayer(userMarker);
    map.removeLayer(accuracyCircle);
    userMarker = null;
    accuracyCircle = null;
    locateBtn.classList.remove("active");
    return;
  }

  followUser = true;
  locateBtn.classList.add("loading");

  // Single fix zuerst, dann kontinuierlich
  navigator.geolocation.getCurrentPosition(
    updateUserPosition,
    onLocationError,
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
  watchId = navigator.geolocation.watchPosition(
    updateUserPosition,
    onLocationError,
    { enableHighAccuracy: true, maximumAge: 5000 }
  );
});

// User deaktiviert follow-mode, wenn er die Karte manuell bewegt
map.on("dragstart", () => { followUser = false; });

// ----- Init -----
render();
</script>
</body>
</html>
